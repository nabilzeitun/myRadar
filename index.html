<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>myRadar</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:    #f2f2f7;
  --sur:   #ffffff;
  --sur2:  #f2f2f7;
  --brd:   #e5e5ea;
  --brd2:  #d1d1d6;
  --lbl:   #8e8e93;
  --txt:   #1c1c1e;
  --txt2:  #3a3a3c;
  --txt3:  #636366;
  --up:    #1d6f42;
  --dn:    #c0392b;
  --font:  -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --fnum:  'SF Mono', 'Menlo', 'Consolas', monospace;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--txt);
  font-family: var(--font);
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
}

/* ── BAR — 3 filas, todas con scroll horizontal ── */
#bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 300;
  background: rgba(242,242,247,.94);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--brd);
  display: flex;
  flex-direction: column;
  padding: 4px 6px 3px;
  gap: 3px;
}

/* Fila genérica: centrada si cabe, scroll si no */
.br-row {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  width: 100%;
}
.br-row::-webkit-scrollbar { display: none; }
.br-row-inner {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  min-width: 100%;
  justify-content: center;
  padding: 1px 0 2px;
}

/* ── STAT-FILTER CHIPS ── */
.stat-l {
  font-size: 9px; font-weight: 600;
  color: var(--lbl);
  text-transform: uppercase;
  letter-spacing: .05em;
  line-height: 1;
}
.stat-v {
  font-size: 13px; font-weight: 600;
  color: var(--txt);
  font-variant-numeric: tabular-nums;
  line-height: 1.15;
}
.stat-v.up { color: var(--up); }
.stat-v.dn { color: var(--dn); }

.statbtn {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1px;
  flex: 0 0 auto;
  background: #fff;
  border: none;
  border-radius: 8px;
  padding: 3px 8px;
  height: 36px;
  min-width: 44px;
  cursor: pointer;
  box-shadow: 0 1px 2px rgba(0,0,0,.06);
  transition: box-shadow .15s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.statbtn:hover {
  box-shadow: 0 1px 4px rgba(0,0,0,.10);
}
.statbtn.active {
  background: #fff;
  box-shadow: 0 0 0 1px #1d1d1f, 0 2px 6px rgba(0,0,0,.12);
}
.statbtn.active .stat-l { color: #3a3a3c; }
.statbtn.active .stat-v { color: #1d1d1f; }
.statbtn.active .stat-v.up { color: #1d6f42; }
.statbtn.active .stat-v.dn { color: #c0392b; }

/* ── MARKET TOGGLE ── */
.mktbtn {
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  background: var(--sur);
  border: none;
  border-radius: 10px;
  width: 36px; height: 36px;
  cursor: pointer;
  color: var(--lbl);
  box-shadow: 0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08);
  transition: box-shadow .15s, background .15s;
  user-select: none;
}
.mktbtn:hover { box-shadow: 0 2px 6px rgba(0,0,0,.15); }
.mktbtn.on {
  background: #fff;
  box-shadow: 0 0 0 1px #1d1d1f, 0 2px 6px rgba(0,0,0,.12);
}
.mktbtn.on.markets-open {
  background: var(--sur);
  box-shadow: 0 1px 4px rgba(29,111,66,.3);
}

/* ── SEARCH ── */
.search-wrap { position: relative; flex-shrink: 0; }
.search-wrap svg {
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  color: var(--lbl); pointer-events: none;
  transition: opacity .15s;
}
.search-wrap:focus-within svg,
.search-wrap.active svg { opacity: 0; pointer-events: none; }
.search-input {
  width: 44px;
  background: var(--sur);
  border: none;
  border-radius: 10px;
  color: var(--txt);
  font-family: var(--font);
  font-size: 12px;
  padding: 6px 4px 6px 22px;
  outline: none;
  box-shadow: 0 1px 2px rgba(0,0,0,.06);
  transition: background .15s, padding .15s, box-shadow .15s;
}
.search-input:focus,
.search-input:not(:placeholder-shown) {
  padding: 6px 4px;
}
.search-input:focus {
  box-shadow: 0 0 0 2px rgba(0,122,255,.2);
}
.search-input::placeholder { color: var(--lbl); }
/* Active search highlight */
.search-wrap.active .search-input {
  background: var(--sur);
  box-shadow: 0 0 0 3px rgba(0,113,227,.25);
}

/* ── RELOAD ── */

#last-upd { font-size: 9px; color: var(--lbl); font-variant-numeric: tabular-nums; white-space: nowrap; line-height: 1; }
.fx-chip {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 0; flex: 0 0 auto;
  background: var(--sur);
  border: none;
  border-radius: 8px;
  padding: 2px 10px;
  height: 28px;
  min-width: 44px;
  cursor: default;
  box-shadow: 0 1px 2px rgba(0,0,0,.06);
}

.fx-lbl {
  font-size: 8px; font-weight: 600; color: var(--lbl);
  text-transform: uppercase; letter-spacing: .04em; line-height: 1;
}
.fx-val {
  font-family: var(--fnum); font-size: 11px; font-weight: 500;
  color: var(--txt2); font-variant-numeric: tabular-nums; line-height: 1.2;
}


/* VIX gradient — only number colored, chip stays normal */
@keyframes vix-pg { 0%,100%{opacity:1} 50%{opacity:.45} }
.vix-val-anim { animation: vix-pg 1.3s ease-in-out infinite; }
.vol-mid {
  background: rgba(241,196,15,.22); color: rgb(155,105,0);
  border-radius: 5px; padding: 1px 6px;
}
.vol-high {
  background: rgba(192,57,43,.22); color: #c0392b;
  border-radius: 5px; padding: 1px 6px;
  animation: vix-pg 1.3s ease-in-out infinite;
}
.fx-cheap { background:rgba(39,174,96,.18); color:#1d6f42; border-radius:5px; padding:1px 6px; }
.fx-dear  { background:rgba(192,57,43,.18); color:#c0392b; border-radius:5px; padding:1px 6px; }
@keyframes ro { to { transform: rotate(360deg); } }

/* ── INDEX TOAST ── */
#idx-toast {
  position: fixed; bottom: 52px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--sur); border: 1px solid var(--brd2);
  border-radius: 14px; padding: 11px 15px;
  box-shadow: 0 6px 28px rgba(0,0,0,.14);
  z-index: 500; min-width: 230px; max-width: 320px;
  opacity: 0; pointer-events: none;
  transition: opacity .18s ease, transform .18s ease;
}
#idx-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
.it-header  { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:8px; gap:8px; }
.it-titles  { display:flex; flex-direction:column; gap:1px; }
.it-name    { font-size:12px; font-weight:500; color:var(--txt); line-height:1.3; }
.it-market  { font-size:10px; color:var(--lbl); line-height:1.3; }
/* Modo card (filtros): centrado, sin filas de detalle */
#idx-toast.card .it-header { justify-content:center; margin-bottom:0; }
#idx-toast.card .it-titles { align-items:center; text-align:center; }
.it-row     { display:flex; justify-content:space-between; align-items:center;
              font-size:10.5px; color:var(--txt3); margin-top:4px; }
.it-row b   { color:var(--txt2); font-weight:500; font-family:var(--fnum); }
/* Modo card: header visible, sin filas de detalle (filtros, carga…) */
#idx-toast.card .it-row { display: none; }
/* Modo simple: solo texto, sin header (errores, fallback) */
#idx-toast .it-msg {
  display: none; font-size: 12.5px; font-weight: 500;
  color: var(--txt2); text-align: center; padding: 4px 0 2px;
}
#idx-toast.simple .it-msg  { display: block; }
#idx-toast.simple .it-header,
#idx-toast.simple .it-row  { display: none; }
#btn-reload.spinning svg { animation: ro .65s linear infinite; }
.idx-chip { cursor: pointer; }
.fx-tap   { cursor: pointer; }


/* ── SCROLL ── */
#scroll {
  position: fixed;
  top: 112px; left: 0; right: 0; bottom: 0;
  padding: 8px;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
  background: var(--sur);
}

/* ── TABLE ── */
table { width: 100%; border-collapse: separate; border-spacing: 0; background: var(--sur); border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }

thead th {
  position: sticky; top: 0; z-index: 10;
  background: #f5f5f7;
  backdrop-filter: blur(8px);
  padding: 7px 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--lbl);
  letter-spacing: .03em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--brd);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  /* All headers: right-align numbers, left-align text — set per column */
  text-align: right;
}
/* text columns left-aligned */
thead th.l { text-align: left; }
/* numeric already right */
thead th:hover { color: var(--txt2); }
thead th.sorted { color: #0071e3; }
thead th.sorted::after { content: ' ↓'; font-size: 9px; opacity: .6; }
thead th.sorted.asc::after { content: ' ↑'; }

tbody tr {
  background: var(--sur);
  border-bottom: 1px solid var(--bg);
  transition: background .08s;
}
tbody {
  background: var(--sur);
}
tbody tr:hover { background: #f5f5fa; }
tbody tr.no-hover:hover { background: var(--sur); cursor: default; }
tbody tr.unloaded { opacity: .45; }

/* ── CELLS ── */
td {
  padding: 6px 12px;
  vertical-align: middle;
  font-size: 13px;
  color: var(--txt);
  white-space: nowrap;
}

/* index */
.ci {
  color: var(--lbl); font-size: 11px;
  text-align: right; width: 28px;
  padding-right: 4px;
  font-variant-numeric: tabular-nums;
}
/* flame */
.cfl { width: 28px; text-align: center; padding: 0 4px; }
.bfl { font-size: 12px; opacity: .14; display: inline-block; }
.bfl.on { opacity: 1; }

/* ticker */
.ctk { font-weight: 600; font-size: 13px; letter-spacing: .01em; white-space: nowrap; }
.mkt-inline {
  font-size: .62em; font-weight: 500;
  margin-left: 3px; vertical-align: baseline;
  padding: 1px 3px; border-radius: 3px;
  font-family: var(--font);
  letter-spacing: .01em;
}
.mkt-inline.open   { color: #1d6f42; background: rgba(29,111,66,.09); }
.mkt-inline.closed { color: #c0392b; background: rgba(192,57,43,.07); }

/* market badge */
.cmkt { width: 72px; }
.mbadge {
  display: inline-block; padding: 2px 7px;
  border-radius: 6px;
  font-size: 11px; font-weight: 500;
  background: var(--sur2);
  border: 1px solid var(--brd);
  color: var(--txt3);
  transition: background .3s, color .3s, border-color .3s;
}
.mbadge.open   { background: rgba(29,111,66,.09);  border-color: rgba(29,111,66,.22); color: #1d6f42; }
.mbadge.closed { background: rgba(192,57,43,.07);  border-color: rgba(192,57,43,.18); color: #c0392b; }

/* company name */
.cnm { color: var(--txt3); font-size: 12.5px; max-width: 170px; overflow: hidden; text-overflow: ellipsis; }

/* numeric cells */
.cpr  { text-align: right; }
.ctg  { text-align: right; }
.cup  { text-align: right; }
.cdchg { text-align: right; }
.cdchg .pill { display: inline-block; min-width: 56px; text-align: center; }
.c52  { text-align: right; width: 140px; }
.num  { font-family: var(--fnum); font-size: 12px; font-variant-numeric: tabular-nums; }
.cur  { font-size: .75em; color: var(--lbl); margin-left: 2px; vertical-align: baseline; }

/* tgt: non-editable, just plain */
.ctg .num { font-family: var(--fnum); font-size: 12px; font-variant-numeric: tabular-nums; }

/* MoS pill */
.pill {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 11.5px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  min-width: 58px;
  text-align: center;
}
.pill.nt { background: var(--sur2); color: var(--lbl); }

/* 52w range */

/* skeleton */
.sk {
  display: inline-block; border-radius: 4px;
  background: linear-gradient(90deg, var(--brd) 25%, var(--sur2) 50%, var(--brd) 75%);
  background-size: 200% 100%;
  animation: sh 1.3s infinite;
  vertical-align: middle;
}
@keyframes sh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

.row-empty td {
  padding: 56px; text-align: center;
  color: var(--lbl); font-size: 14px;
}

/* ── TOAST ── */

#ver {
  position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
  font-size: 9px; color: var(--lbl);
  background: var(--sur); border: none; box-shadow: 0 1px 3px rgba(0,0,0,.12);
  border-radius: 20px; padding: 3px 12px;
  pointer-events: none; z-index: 50;
  letter-spacing: .04em; white-space: nowrap;
  transition: opacity .6s ease;
}
#ver.hidden { opacity: 0; }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: var(--brd2); border-radius: 2px; }
::-webkit-scrollbar-track { background: transparent; }

/* ── RESPONSIVE — fluid compression ── */
/* Always hide Empresa & 52W Range at narrow widths */
@media (max-width: 800px) {
  .col-empresa, th.col-empresa { display: none; }
}
@media (max-width: 680px) {
  .col-52w, th.col-52w { display: none; }
}
@media (max-width: 700px) {
  .statbtn { padding: 2px 6px; height: 30px; min-width: 34px; }
  .stat-l { font-size: 8px; }
  .stat-v { font-size: 11px; }
  .mktbtn { width: 30px; height: 30px; }
  .fx-chip { padding: 2px 5px; height: 26px; min-width: 32px; }
  .fx-lbl { font-size: 7.5px; }
  .fx-val { font-size: 10px; }
  #last-upd { font-size: 9px; }
  #bar { padding: 3px 4px 2px; gap: 2px; }
  #scroll { top: 104px; }

  td { padding: 4px 6px; font-size: 11px; }
  thead th { padding: 5px 6px; font-size: 9px; }
  .num { font-size: 11px; }
  .pill { font-size: 10px; padding: 1px 5px; min-width: 40px; }
  .mbadge { font-size: 9.5px; padding: 1px 4px; }
  .ci { width: 18px; }
  .cfl { width: 18px; }
  .c52 { width: 90px; }

}

@media (max-width: 500px) {
  /* Hide less critical columns */
  .col-empresa, th.col-empresa { display: none; }
  .col-52w, th.col-52w { display: none; }

  td { padding: 4px 4px; font-size: 10.5px; }
  thead th { padding: 4px 4px; font-size: 8.5px; }
  .num { font-size: 10.5px; }
  .pill { font-size: 9.5px; min-width: 36px; }
  .statbtn { padding: 1px 5px; height: 28px; min-width: 28px; }
  .stat-v { font-size: 10px; }
  .stat-l { font-size: 7px; }
  #scroll { top: 98px; }
}
</style>
</head>
<body>

<!-- BARRA DE CONTROL — 3 filas con scroll horizontal -->
<div id="bar">

  <!-- Fila 1: índices de volatilidad -->
  <div class="br-row" id="br-row1">
    <div class="br-row-inner">
      <div class="fx-chip idx-chip" data-idx="VIX"   ><span class="fx-lbl">VIX</span>   <span class="fx-val" id="fx-vix">—</span></div>
      <div class="fx-chip idx-chip" data-idx="VVIX"  ><span class="fx-lbl">VVIX</span>  <span class="fx-val" id="fx-vvix">—</span></div>
      <div class="fx-chip idx-chip" data-idx="VXN"   ><span class="fx-lbl">VXN</span>   <span class="fx-val" id="fx-vxn">—</span></div>
      <div class="fx-chip idx-chip" data-idx="VXD"   ><span class="fx-lbl">VXD</span>   <span class="fx-val" id="fx-vxd">—</span></div>
      <div class="fx-chip idx-chip" data-idx="RVX"   ><span class="fx-lbl">RVX</span>   <span class="fx-val" id="fx-rvx">—</span></div>
      <div class="fx-chip idx-chip" data-idx="VHSI"  ><span class="fx-lbl">VHSI</span>  <span class="fx-val" id="fx-vhsi">—</span></div>
      <div class="fx-chip idx-chip" data-idx="VSTOXX"><span class="fx-lbl">VSTOXX</span><span class="fx-val" id="fx-vstoxx">—</span></div>
      <div class="fx-chip idx-chip" data-idx="VFTSE" ><span class="fx-lbl">VFTSE</span> <span class="fx-val" id="fx-vftse">—</span></div>
    </div>
  </div>

  <!-- Fila 2: divisas + actualizar -->
  <div class="br-row" id="br-row2">
    <div class="br-row-inner">
      <div class="fx-chip fx-tap" data-fx="EURUSD"><span class="fx-lbl">EUR/USD</span><span class="fx-val" id="fx-eurusd">—</span></div>
      <div class="fx-chip fx-tap" data-fx="EURGBP"><span class="fx-lbl">EUR/GBP</span><span class="fx-val" id="fx-eurgbp">—</span></div>
      <div class="fx-chip fx-tap" data-fx="EURHKD"><span class="fx-lbl">EUR/HKD</span><span class="fx-val" id="fx-eurhkd">—</span></div>
      <div class="fx-chip fx-tap" data-fx="EURAUD"><span class="fx-lbl">EUR/AUD</span><span class="fx-val" id="fx-euraud">—</span></div>
      <div class="fx-chip fx-tap" data-fx="EURCHF"><span class="fx-lbl">EUR/CHF</span><span class="fx-val" id="fx-eurchf">—</span></div>
      <button class="fx-chip" id="btn-reload" onclick="manualReload()" title="Actualizar" style="cursor:pointer;border:none;background:var(--sur);flex-shrink:0;">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--lbl)" stroke-width="2.2">
          <path d="M3 12a9 9 0 019-9 9.75 9.75 0 016.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 01-9 9 9.75 9.75 0 01-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
        <span class="fx-val" id="last-upd" style="font-size:9px">—</span>
      </button>
    </div>
  </div>

  <!-- Fila 3: lupa + filtros -->
  <div class="br-row" id="br-row3">
    <div class="br-row-inner">
      <div class="search-wrap">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input class="search-input" type="text" id="q" placeholder="" oninput="render()">
      </div>
      <button class="statbtn" id="f-loaded" onclick="setFilter('loaded')">
        <span class="stat-l">Cargadas</span><span class="stat-v" id="s-ld">—</span>
      </button>
      <button class="statbtn active" id="f-up" onclick="setFilter('up')">
        <span class="stat-l">Baratas</span><span class="stat-v up" id="s-up">—</span>
      </button>
      <button class="statbtn" id="f-dn" onclick="setFilter('dn')">
        <span class="stat-l">Caras</span><span class="stat-v dn" id="s-dn">—</span>
      </button>
      <button class="statbtn" id="f-flag" onclick="setFilter('flag')">
        <span class="stat-l">🔥</span><span class="stat-v" id="s-flag">—</span>
      </button>
      <button class="statbtn" id="f-up-flag" onclick="setFilter('up-flag')">
        <span class="stat-l">🛒</span><span class="stat-v" id="s-upflag">—</span>
      </button>
      <button class="mktbtn on" id="mf-open" onclick="toggleMktFilter()" title="Filtrar mercados abiertos">
        <svg id="mkt-ecg" width="28" height="18" viewBox="0 0 28 18" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <defs>
            <linearGradient id="area-g" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#1d6f42" stop-opacity="0.3"/>
              <stop offset="100%" stop-color="#1d6f42" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <path id="mkt-area" d="M0,16 L4,12 L8,9 L12,11 L16,5 L20,3 L24,6 L28,1 L28,18 L0,18 Z" fill="url(#area-g)"/>
          <polyline id="mkt-line" points="0,16 4,12 8,9 12,11 16,5 20,3 24,6 28,1" fill="none" stroke="#1d6f42" stroke-width="1.6"/>
          <circle id="mkt-dot2" cx="28" cy="1" r="2.5" fill="#1d6f42"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<!-- TABLE -->
<div id="scroll">
  <table>
    <thead>
      <tr>
        <th class="cfl" onclick="sortBy('flag')"></th>
        <th class="l" onclick="sortBy('tick')">Ticker</th>
        <th class="l col-empresa">Empresa</th>
        <th class="r" onclick="sortBy('price')">Precio</th>
        <th class="r" onclick="sortBy('target')">Objetivo</th>
        <th class="r sorted" id="th-up" onclick="sortBy('upside')">MoS</th>
        <th class="r" onclick="sortBy('daychg')">Día %</th>
        <th class="r col-52w" onclick="sortBy('range52')">52W Range</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const CSV_URL     = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQhCXI4uXagUPUSv-QomsWuEoCDHlFlxzrFTXSgi9aQ8Oy1sEacerfIdKxPGZdm1VJw-P1PzNQH5Q3_/pub?gid=0&single=true&output=csv';
const FX_URL      = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQhCXI4uXagUPUSv-QomsWuEoCDHlFlxzrFTXSgi9aQ8Oy1sEacerfIdKxPGZdm1VJw-P1PzNQH5Q3_/pub?gid=1216010991&single=true&output=csv';
const INDICES_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQhCXI4uXagUPUSv-QomsWuEoCDHlFlxzrFTXSgi9aQ8Oy1sEacerfIdKxPGZdm1VJw-P1PzNQH5Q3_/pub?gid=929095159&single=true&output=csv';
const REFRESH_MS = 60000; // auto-refresh every 60 s (Apps Script actualiza cada 5 min)


const MF={NASDAQ:'NASDAQ',NYSE:'NYSE',US:'NYSE',OTC:'OTC',BME:'BME',LON:'LON',
          HKG:'HKEX',AMS:'AMS',EPA:'EPA',ETR:'ETR',ASX:'ASX',BIT:'BIT',
          VIE:'VIE',FRA:'FRA',SWX:'SWX'};

let rows=[], sortKey='upside', sortDir=-1, filterMode='up';
let mktFilter='open'; // default: show only open markets

// ── PARSE ──
function parseNum(s){
  if(!s) return null;
  s=s.trim().replace(/^"|"$/g,'');
  if(!s||['#N/A','#REF!','#ERROR!','#VALUE!','#DIV/0!','#NAME?','Cargando...'].includes(s)) return null;
  const hD=s.includes('.'), hC=s.includes(',');
  let n = hD&&hC ? s.replace(/\./g,'').replace(',','.') : hC ? s.replace(',','.') : s;
  const v=parseFloat(n); return isNaN(v)?null:v;
}

function splitLine(line){
  const r=[]; let cur='',q=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){q=!q;}
    else if(line[i]===','&&!q){r.push(cur);cur='';}
    else cur+=line[i];
  }
  r.push(cur); return r;
}

// ── CSV HELPERS ──
// Find 3-letter currency code in split columns
function findCurrency(cols) {
  for (const c of cols) {
    const v = c.trim().replace(/^"|"$/g,'');
    if (/^[A-Z]{3}$/.test(v) && !['NaN','INF'].includes(v)) return v;
  }
  return '';
}

// Find flag marker 'x' in split columns
function findFlag(cols) {
  for (const c of cols) {
    const v = c.trim().replace(/^"|"$/g,'').toLowerCase();
    if (v === 'x') return true;
  }
  return false;
}

// Extract ordered list of numbers from column fragments
// Handles European decimals: "28","71" → 28.71
function extractNumbers(parts) {
  const results = [];
  let i = 0;
  while (i < parts.length) {
    const raw = (parts[i]||'').trim().replace(/^"|"$/g,'');
    // Skip non-numeric/empty/text cols (currency, flag)
    if (!raw || isNaN(raw.replace(',','.')) && !/^-?\d/.test(raw)) { i++; continue; }

    // Check if this is an integer part of a European decimal (e.g. "28" followed by "71")
    const isInt = /^-?\d+$/.test(raw);
    const nextRaw = i+1 < parts.length ? (parts[i+1]||'').trim().replace(/^"|"$/g,'') : '';
    const nextIsDecimals = /^\d{1,5}$/.test(nextRaw) && nextRaw.length <= 5;
    // Only combine if next looks like decimal part (≤5 digits, no leading zero issues)
    if (isInt && nextIsDecimals) {
      // European decimal: combine as "28,71" → parseNum → 28.71
      results.push(parseNum(raw + ',' + nextRaw));
      i += 2;
    } else {
      results.push(parseNum(raw));
      i++;
    }
  }
  return results;
}

function parseCSV(text){
  const lines=text.trim().split('\n');
  if(lines.length<2) return [];
  const out=[];
  for(let i=1;i<lines.length;i++){
    const rawLine = lines[i].replace(/\r/g,'');
    if(rawLine.trim()==='') continue;
    // splitLine handles quoted fields: "21,89" → single token "21,89"
    // parseNum("21,89") → 21.89 ✓
    const c = splitLine(rawLine);
    if(c.length<5) continue;
    // TICKER(0) MERCADO(1) RAW(2) NOMBRE(3) PRECIO(4) TARGET(5) DIVISA(6) FLAG(7) HIGH_52W(8) LOW_52W(9) VAR_DIA_%(10)
    const tick=c[0].trim(); if(!tick||tick==='TICKER') continue;
    const mkt   = c[1].trim();
    const name  = c[3].trim();
    const price = parseNum(c[4]);
    const tgtSh = parseNum(c[5]);
    const cur   = (c[6]||'').trim();
    const flagSheet = (c[7]||'').trim().toLowerCase() === 'x';
    const high52 = parseNum(c[8]);
    const low52  = parseNum(c[9]);
    const dayChg = parseNum(c[10]);
    const target = tgtSh;
    const flagVal = flagSheet;
    out.push({tick,mkt,name,price,target,cur,flag:flagVal,high52,low52,dayChg});
  }
  return out;
}

const upside = r => (r.price==null||r.target==null) ? null : ((r.target-r.price)/r.price)*100;
const r52pct = r => (r.price==null||r.high52==null||r.low52==null||r.high52<=r.low52) ? null
                   : Math.max(0,Math.min(1,(r.price-r.low52)/(r.high52-r.low52)));

// ── LOAD ──
let _loading=false;
async function loadSheet(silent=false){
  if(_loading) return;
  _loading=true;
  const btn=document.getElementById('btn-reload');
  btn.disabled=true;
  btn.classList.add('spinning');
  try{
    const res=await fetch(CSV_URL+'&t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const newRows = parseCSV(await res.text());
    // Preserve dayChg from previous load if new value is null (GF sometimes returns empty)
    if (rows.length > 0) {
      newRows.forEach(nr => {
        const old = rows.find(r => r.tick === nr.tick);
        if (old && nr.dayChg == null && old.dayChg != null) nr.dayChg = old.dayChg;
      });
    }
    rows = newRows;
    updateMktDot();
    const now=new Date();
    document.getElementById('last-upd').textContent=now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    updateStats(); render();
    if(!silent) showCard('Datos de mercado actualizados', '', null);
  }catch(e){
    if(!silent) toast('Error: '+e.message);
  }
  btn.disabled=false;
  btn.classList.remove('spinning');
  _loading=false;
}
function manualReload(){ loadSheet(false); loadFX(); loadIndices(); }

const fxData = {};
const FX_LABELS = { EURUSD:'EUR/USD', EURGBP:'EUR/GBP', EURHKD:'EUR/HKD', EURAUD:'EUR/AUD', EURCHF:'EUR/CHF' };

async function loadFX() {
  try {
    const res = await fetch(FX_URL + '&t=' + Date.now());
    if (!res.ok) return;
    const lines = (await res.text()).trim().split('\n');
    lines.forEach(line => {
      if (!line.trim()) return;
      const cols = splitLine(line.replace(/\r/g,''));
      if (cols.length < 2) return;
      const key = cols[0].replace(/[^A-Za-z]/g,'').toUpperCase();
      if (!key) return;
      const val      = parseNum(cols[1]);
      const pLow     = parseNum(cols[2]);
      const pHigh    = parseNum(cols[3]);
      const tsPrice  = (cols[4]||'').trim();
      const tsThresh = (cols[5]||'').trim();
      const percLow  = (cols[6]||'').trim() || '15';
      const percHigh = (cols[7]||'').trim() || '85';
      fxData[key] = { val, pLow, pHigh, tsPrice, tsThresh, percLow, percHigh };
    });
    const setFx = (id, key) => {
      const el = document.getElementById(id);
      if (!el) return;
      const d = fxData[key];
      if (!d) return;
      if (d.val !== null) {
        const newText = d.val.toFixed(2);
        if (el.textContent !== newText) el.textContent = newText;
      }
      const v = d.val ?? parseFloat(el.textContent);
      if (!v || isNaN(v)) return;
      if (d.pLow != null && d.pHigh != null) {
        const newClass = v >= d.pHigh ? 'fx-val fx-cheap'
                       : v <= d.pLow  ? 'fx-val fx-dear'
                       :                'fx-val';
        if (el.className !== newClass) el.className = newClass;
      }
    };
    setFx('fx-eurusd', 'EURUSD');
    setFx('fx-eurgbp', 'EURGBP');
    setFx('fx-eurhkd', 'EURHKD');
    setFx('fx-euraud', 'EURAUD');
    setFx('fx-eurchf', 'EURCHF');
  } catch(e) {
    console.warn('FX load error:', e);
  }
}

// ── VOL COLOR ──
function applyVolColor(el, v, t1, t2) {
  el.style.color = '';
  el.style.fontWeight = '';
  if (v >= t2) {
    el.className = 'fx-val vol-high';
  } else if (v >= t1) {
    el.className = 'fx-val vol-mid';
  } else {
    el.className = 'fx-val';
  }
}

// ── INDICES ──
const indicesData = {};
async function loadIndices() {
  try {
    const res = await fetch(INDICES_URL + '&t=' + Date.now());
    if (!res.ok) return;
    const lines = (await res.text()).trim().split('\n');
    const idMap = { VIX:'fx-vix', VSTOXX:'fx-vstoxx', VFTSE:'fx-vftse', VHSI:'fx-vhsi',
                    RVX:'fx-rvx', VXD:'fx-vxd', VXN:'fx-vxn', VVIX:'fx-vvix' };
    lines.forEach(line => {
      if (!line.trim()) return;
      const cols = splitLine(line.replace(/\r/g,''));
      if (cols.length < 3) return;
      // Columnas: [0]NOMBRE [1]MERCADO [2]TICKER [3]VALOR [4]UMBRAL_LOW [5]UMBRAL_HIGH
      //           [6]TS_PRECIO [7]TS_UMBRAL [8]PERC_LOW [9]PERC_HIGH
      const name     = (cols[0]||'').trim();
      const market   = (cols[1]||'').trim();
      const ticker   = (cols[2]||'').trim().toUpperCase();
      const el = document.getElementById(idMap[ticker]);
      if (!el) return;
      const val      = parseNum(cols[3]);
      const t1       = parseNum(cols[4]) ?? 30;
      const t2       = parseNum(cols[5]) ?? 40;
      const tsPrice  = (cols[6]||'').trim();
      const tsThresh = (cols[7]||'').trim();
      const percLow  = (cols[8]||'').trim() || '80';
      const percHigh = (cols[9]||'').trim() || '95';
      indicesData[ticker] = { name, market, val, t1, t2, tsPrice, tsThresh, percLow, percHigh };
      if (val != null) {
        const newText  = val.toFixed(2);
        const newClass = val >= t2 ? 'fx-val vol-high'
                       : val >= t1 ? 'fx-val vol-mid'
                       :             'fx-val';
        if (el.textContent !== newText)  el.textContent = newText;
        if (el.className   !== newClass) el.className   = newClass;
      }
      // val null → preservar lo que ya se muestra (no resetear a '–')
    });
  } catch(e) { console.warn('Indices load error:', e); }
}

// ── NOTIFICACIONES — sistema unificado ──
let _toastTimer = null;

function _ntShow() {
  const t = document.getElementById('idx-toast');
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 5000);
}

// Card compacto: header (nombre + subtítulo + valor opcional), sin filas de detalle
function showCard(name, sub, val) {
  const t = document.getElementById('idx-toast');
  t.classList.remove('simple');
  t.classList.add('card');
  document.getElementById('it-name').textContent   = name || '';
  document.getElementById('it-market').textContent = sub  || '';
  const valEl = document.getElementById('it-val');
  if (val != null) {
    valEl.textContent = String(val);
    valEl.style.display = '';
  } else {
    valEl.textContent = '';
    valEl.style.display = 'none';
  }
  valEl.className = 'fx-val';
  _ntShow();
}

function showIdxInfo(ticker) {
  const d = indicesData[ticker];
  if (!d) return;
  const t = document.getElementById('idx-toast');
  t.classList.remove('simple');
  t.classList.remove('card');
  document.getElementById('it-name').textContent   = d.name   || ticker;
  document.getElementById('it-market').textContent = d.market || '';
  const valEl = document.getElementById('it-val');
  valEl.textContent = d.val != null ? d.val.toFixed(2) : '–';
  valEl.className = 'fx-val';

  document.getElementById('it-p20').textContent      = d.t1 != null ? d.t1.toFixed(2) : '–';
  document.getElementById('it-p80').textContent      = d.t2 != null ? d.t2.toFixed(2) : '–';
  document.getElementById('it-ts-price').textContent  = d.tsPrice  || '–';
  document.getElementById('it-ts-thresh').textContent = d.tsThresh || '–';

}
document.querySelectorAll('.idx-chip').forEach(chip => {
  chip.addEventListener('click', e => {
    e.stopPropagation();
    showIdxInfo(chip.dataset.idx);
  });
});

function showFxInfo(key) {
  const d = fxData[key];
  if (!d) return;
  const t = document.getElementById('idx-toast');
  t.classList.remove('simple');
  t.classList.remove('card');
  document.getElementById('it-name').textContent   = FX_LABELS[key] || key;
  document.getElementById('it-market').textContent = '';
  const valEl = document.getElementById('it-val');

    : 'fx-val';

  document.getElementById('it-p20').textContent       = d.pLow  != null ? d.pLow.toFixed(4)  : '–';
  document.getElementById('it-p80').textContent       = d.pHigh != null ? d.pHigh.toFixed(4) : '–';
  document.getElementById('it-ts-price').textContent  = d.tsPrice  || '–';

document.querySelectorAll('.fx-tap').forEach(chip => {
  chip.addEventListener('click', e => {
    e.stopPropagation();
    showFxInfo(chip.dataset.fx);
  });
});

document.addEventListener('click', (e) => {
  if (e.target.closest('#bar')) return; // clicks en la barra abren/actualizan el toast
  clearTimeout(_toastTimer);
  document.getElementById('idx-toast').classList.remove('show');
});

// Auto-refresh
setInterval(()=>{ loadSheet(true); loadFX(); loadIndices(); }, REFRESH_MS);

// ── STATS ──
function updateStats(){
  const ld=rows.filter(r=>r.price!=null);
  const ok=ld.filter(r=>r.target!=null);
  const ups=ok.filter(r=>upside(r)>0).length;
  const dns=ok.filter(r=>upside(r)!=null&&upside(r)<=0).length;
  const avg=ok.length?ok.reduce((s,r)=>s+upside(r),0)/ok.length:null;
  const flagged = rows.filter(r=>r.flag).length;
  const upflag  = rows.filter(r=>r.flag&&r.price!=null&&upside(r)>0).length;
  const totEl=document.getElementById('s-tot'); if(totEl) totEl.textContent=rows.length||'—';
  document.getElementById('s-ld').textContent=ld.length+(rows.length?'/'+rows.length:'');
  document.getElementById('s-up').textContent=ups||'—';
  document.getElementById('s-dn').textContent=dns||'—';
  document.getElementById('s-flag').textContent=flagged||'—';
  document.getElementById('s-upflag').textContent=upflag||'—';
}

// ── SORT ──
const TH={tick:2,price:4,target:5,upside:6,daychg:7,range52:8,flag:1};
function sortBy(key){
  if(sortKey===key) sortDir*=-1;
  else{sortKey=key; sortDir=(key==='upside'||key==='flag')?-1:1;}
  document.querySelectorAll('thead th').forEach(th=>th.classList.remove('sorted','asc'));
  const idx=TH[key], ths=document.querySelectorAll('thead th');
  if(idx!=null&&ths[idx]){ths[idx].classList.add('sorted');if(sortDir===1)ths[idx].classList.add('asc');}
  render();
}

// ── FILTER ──
function baseRows() {
  // Filas base: aplica filtro de mercado si está activo
  return mktFilter === 'open' ? rows.filter(r => isMarketOpen(r.mkt)) : rows;
}

function filterCount(mode) {
  const base = baseRows();
  switch(mode) {
    case 'all':     return base.length;
    case 'loaded':  return base.filter(r=>r.price!=null).length;
    case 'up':      return base.filter(r=>r.price!=null&&upside(r)>0).length;
    case 'dn':      return base.filter(r=>r.price!=null&&upside(r)!=null&&upside(r)<=0).length;
    case 'flag':    return base.filter(r=>r.flag).length;
    case 'up-flag': return base.filter(r=>r.flag&&r.price!=null&&upside(r)>0).length;
    default: return null;
  }
}

function setFilter(mode){
  const mktSfx = mktFilter === 'open' ? ' con mercados abiertos ahora' : '';
  const MSGS = {
    'loaded':  n => `${n} empresas cargadas${mktSfx}`,
    'up':      n => `${n} empresas baratas${mktSfx}`,
    'dn':      n => `${n} empresas caras${mktSfx}`,
    'flag':    n => `${n} empresas destacadas${mktSfx}`,
    'up-flag': n => `${n} empresas baratas y destacadas${mktSfx}`,
  };
  // Toggle off si ya está activo → mostrar todo
  if(filterMode===mode){
    filterMode='all';
    ['loaded','up','dn','flag','up-flag'].forEach(f=>{
      const el=document.getElementById('f-'+f); if(el) el.classList.remove('active');
    });
    showCard(`${filterCount('all')} empresas en myRadar${mktSfx}`, '', null);
    render();
    return;
  }
  filterMode=mode;
  ['loaded','up','dn','flag','up-flag'].forEach(f=>{
    const el=document.getElementById('f-'+f); if(el) el.classList.toggle('active',f===mode);
  });
  const n = filterCount(mode);
  showCard((MSGS[mode]||(() => mode))(n), '', null);
  render();
}

function toggleMktFilter(){
  mktFilter = mktFilter==='open' ? null : 'open';
  document.getElementById('mf-open').className='mktbtn'+(mktFilter?' on':'');
  updateMktDot();
  showCard(
    mktFilter === 'open' ? 'Mostrando sólo mercados abiertos' : 'Mostrando todos los mercados',
    '', null
  );
  render();
}

function updateMktDot(){
  const ecg  = document.getElementById('mkt-ecg');
  const area = document.getElementById('mkt-area');
  const line = document.getElementById('mkt-line');
  const dot  = document.getElementById('mkt-dot2');
  const grad = document.getElementById('area-g');
  if (!ecg) return;
  const filterOn = mktFilter === 'open';
  const anyOpen  = rows.length > 0 && rows.some(r => isMarketOpen(r.mkt));
  dot.innerHTML = '';
  if (filterOn && anyOpen) {
    const c = '#1d6f42';
    grad.children[0].setAttribute('stop-color', c);
    grad.children[1].setAttribute('stop-color', c);
    area.setAttribute('d', 'M0,16 L4,12 L8,9 L12,11 L16,5 L20,3 L24,6 L28,1 L28,18 L0,18 Z');
    line.setAttribute('stroke', c);
    line.setAttribute('points', '0,16 4,12 8,9 12,11 16,5 20,3 24,6 28,1');
    dot.setAttribute('r', '2.5');
    dot.setAttribute('fill', c);
    dot.setAttribute('cx', '0'); dot.setAttribute('cy', '0');
    dot.setAttribute('visibility', 'visible');
    dot.innerHTML = '<animateMotion dur="2.5s" repeatCount="indefinite" path="M0,16 L4,12 L8,9 L12,11 L16,5 L20,3 L24,6 L28,1"/>';
  } else if (filterOn && !anyOpen) {
    const c = '#f85149';
    grad.children[0].setAttribute('stop-color', c);
    grad.children[1].setAttribute('stop-color', c);
    area.setAttribute('d', 'M0,9 L28,9 L28,18 L0,18 Z');
    line.setAttribute('stroke', c);
    line.setAttribute('points', '0,9 28,9');
    dot.setAttribute('r', '2.5');
    dot.setAttribute('fill', c);
    dot.setAttribute('cx', '0'); dot.setAttribute('cy', '0');
    dot.setAttribute('visibility', 'visible');
    dot.innerHTML = '<animateMotion dur="2s" repeatCount="indefinite" path="M0,9 L28,9"/>';
  } else {
    const c = '#f85149';
    grad.children[0].setAttribute('stop-color', c);
    grad.children[1].setAttribute('stop-color', c);
    area.setAttribute('d', 'M0,9 L28,9 L28,18 L0,18 Z');
    line.setAttribute('stroke', c);
    line.setAttribute('points', '0,9 28,9');
    dot.setAttribute('visibility', 'hidden');
  }
}

// ── 52W RANGE SVG (compact, shows min/price/max in one cell) ──
function range52svg(r){
  const pct=r52pct(r);
  const W=120, H=22;
  if(pct===null) return '<span style="color:var(--lbl);font-size:11px">—</span>';

  const inLower = pct<=0.5;
  const dotC = inLower?'#1d6f42':'#c0392b';
  const fillC = inLower?'#d1eedc':'#fad7d3';

  const nx = v => Math.round(4+v*(W-8));
  const prX = nx(pct);
  const midX = nx(0.5);
  const H2 = H/2;
  const pLabel = Math.round(pct*100);

  // Format numbers compactly
  const fmtC = v => {
    if(v==null) return '';
    if(Math.abs(v)>=10000) return (v/1000).toFixed(0)+'k';
    if(Math.abs(v)>=1000)  return v.toLocaleString('es-ES',{maximumFractionDigits:0});
    return v.toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:1});
  };

  const loLabel = fmtC(r.low52);
  const hiLabel = fmtC(r.high52);
  const prLabel = fmtC(r.price);

  return `<div style="display:flex;align-items:center;gap:4px" title="${pLabel}% del rango 52 semanas">
    <span style="font-family:var(--fnum);font-size:10px;color:var(--lbl);min-width:28px;text-align:right">${loLabel}</span>
    <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;flex-shrink:0">
      <rect x="4" y="${H2-2}" width="${W-8}" height="4" rx="2" fill="#e5e5ea"/>
      <rect x="4" y="${H2-2}" width="${Math.max(0,prX-4)}" height="4" rx="2" fill="${fillC}"/>
      <line x1="${midX}" y1="${H2-5}" x2="${midX}" y2="${H2+5}" stroke="#c7c7cc" stroke-width="1" stroke-dasharray="2,1.5"/>
      <line x1="4"    y1="${H2-4}" x2="4"    y2="${H2+4}" stroke="#c7c7cc" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="${W-4}" y1="${H2-4}" x2="${W-4}" y2="${H2+4}" stroke="#c7c7cc" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="${prX}" cy="${H2}" r="4.5" fill="${dotC}"/>
      <circle cx="${prX}" cy="${H2}" r="2"   fill="white"/>
    </svg>
    <span style="font-family:var(--fnum);font-size:10px;color:var(--lbl);min-width:28px">${hiLabel}</span>
  </div>`;
}

// ── MARKET HOURS ──
// Uses Intl.DateTimeFormat to get the LOCAL time in each market's timezone.
// This is always correct regardless of the user's device timezone.
function isMarketOpen(mkt) {
  const now = new Date();

  // Get local time in a given IANA timezone
  const localTime = (tz) => {
    const parts = new Intl.DateTimeFormat('en-US', {
      timeZone: tz,
      hour: 'numeric', minute: 'numeric',
      weekday: 'short', hour12: false
    }).formatToParts(now);
    const get = (t) => parseInt(parts.find(p=>p.type===t)?.value||'0');
    const weekday = parts.find(p=>p.type==='weekday')?.value;
    const isWeekend = weekday==='Sat' || weekday==='Sun';
    return { h: get('hour'), m: get('minute'), isWeekend };
  };

  // Is local time in timezone between open and close?
  const open = (tz, oh, om, ch, cm) => {
    const {h, m, isWeekend} = localTime(tz);
    if (isWeekend) return false;
    const t = h*60+m, o = oh*60+om, c = ch*60+cm;
    return t >= o && t < c;
  };

  switch(mkt) {
    case 'NYSE': case 'NASDAQ': case 'US': case 'OTC':
      return open('America/New_York', 9,30, 16,0);
    case 'BME':
      return open('Europe/Madrid', 9,0, 17,30);
    case 'LON':
      return open('Europe/London', 8,0, 16,30);
    case 'EPA':
      return open('Europe/Paris', 9,0, 17,30);
    case 'ETR': case 'FRA':
      return open('Europe/Berlin', 9,0, 17,30);
    case 'AMS':
      return open('Europe/Amsterdam', 9,0, 17,30);
    case 'BIT':
      return open('Europe/Rome', 9,0, 17,30);
    case 'VIE':
      return open('Europe/Vienna', 9,0, 17,30);
    case 'SWX':
      return open('Europe/Zurich', 9,0, 17,30);
    case 'HKG': case 'HKEX':
      return open('Asia/Hong_Kong', 9,30, 16,0);
    case 'ASX':
      return open('Australia/Sydney', 10,0, 16,0);
    default:
      return false;
  }
}

// ── GRADIENT PILL ──
// Maps upside % to a red→orange→yellow→green color scale
function pillStyle(u) {
  if (u == null) return {bg:'var(--sur2)', color:'var(--lbl)'};

  let cr, cg, cb;

  if (u >= 0) {
    // BARATAS: amarillo claro (u~0) → verde intenso (u>=40)
    // u=0  → rgb(180,210,100) amarillo-verde claro
    // u=40 → rgb(29,111,66)   verde intenso
    const t = Math.min(1, u / 40); // 0..1
    cr = Math.round(180 + (29  - 180) * t);
    cg = Math.round(210 + (111 - 210) * t);
    cb = Math.round(100 + (66  - 100) * t);
  } else {
    // CARAS: amarillo (u~0) → naranja → rojo intenso (u<=-40)
    // u=0   → rgb(241,196,15)  amarillo
    // u=-20 → rgb(230,126,34)  naranja
    // u=-40 → rgb(192,57,43)   rojo
    const t = Math.min(1, Math.abs(u) / 40); // 0..1
    if (t < 0.5) {
      const s = t / 0.5;
      cr = Math.round(241 + (230 - 241) * s);
      cg = Math.round(196 + (126 - 196) * s);
      cb = Math.round(15  + (34  - 15)  * s);
    } else {
      const s = (t - 0.5) / 0.5;
      cr = Math.round(230 + (192 - 230) * s);
      cg = Math.round(126 + (57  - 126) * s);
      cb = Math.round(34  + (43  - 34)  * s);
    }
  }

  const bg    = `rgba(${cr},${cg},${cb},0.18)`;
  const color = `rgb(${Math.round(cr*0.55)},${Math.round(cg*0.55)},${Math.round(cb*0.55)})`;
  return {bg, color};
}

// ── DAY CHANGE ──
function dayChgStr(r) {
  if (r.dayChg == null) return '<span class="num" style="color:var(--lbl)">—</span>';
  const v   = r.dayChg;
  const str = (v >= 0 ? '+' : '') + v.toFixed(1) + '%';

  // All values wrapped in same-width container for consistent alignment
  const wrap = (inner) => `<span style="display:inline-block;min-width:58px;text-align:center">${inner}</span>`;

  // Extreme: beyond ±10%
  if (v >= 10)  return wrap(`<span class="pill" style="background:rgba(29,111,66,.25);color:#1d6f42;outline:1.5px solid rgba(29,111,66,.5)">${str}</span>`);
  if (v <= -10) return wrap(`<span class="pill" style="background:rgba(192,57,43,.25);color:#c0392b;outline:1.5px solid rgba(192,57,43,.5)">${str}</span>`);

  // Gradient +3% to +10%
  if (v >= 3) {
    const t = Math.min(1, (v - 3) / 7);
    const cr = Math.round(180 - 151*t), cg = Math.round(210 - 99*t), cb = Math.round(100 - 34*t);
    const bg = `rgba(${cr},${cg},${cb},0.16)`, color = `rgb(${Math.round(cr*.6)},${Math.round(cg*.6)},${Math.round(cb*.6)})`;
    return wrap(`<span class="pill" style="background:${bg};color:${color}">${str}</span>`);
  }

  // Gradient -3% to -10%
  if (v <= -3) {
    const t = Math.min(1, (Math.abs(v) - 3) / 7);
    const cr = Math.round(241 + (192-241)*t), cg = Math.round(196 + (57-196)*t), cb = Math.round(15 + (43-15)*t);
    const bg = `rgba(${cr},${cg},${cb},0.16)`, color = `rgb(${Math.round(cr*.6)},${Math.round(cg*.6)},${Math.round(cb*.6)})`;
    return wrap(`<span class="pill" style="background:${bg};color:${color}">${str}</span>`);
  }

  // Between -3% and +3%: plain, same font as .num
  return wrap(`<span class="num" style="color:var(--txt)">${str}</span>`);
}

// ── RENDER ──
const fmt=(v,d=2)=>v==null?'—':v.toLocaleString('es-ES',{minimumFractionDigits:d,maximumFractionDigits:d});

function render(){
  // Always restore thead visibility
  const thead = document.querySelector('thead');
  if (thead) thead.style.display = '';
  const q=(document.getElementById('q').value||'').toLowerCase();
  // Active state on search wrap
  const sw=document.querySelector('.search-wrap');
  if(sw) sw.classList.toggle('active', q.length>0);
  let list=rows.filter(r=>{
    if(q&&!r.tick.toLowerCase().includes(q)&&!(r.name||'').toLowerCase().includes(q)&&!r.mkt.toLowerCase().includes(q)) return false;
    if(filterMode==='loaded'  && r.price==null) return false;
    if(filterMode==='up'      && !(r.price!=null&&upside(r)>0)) return false;
    if(filterMode==='dn'      && !(r.price!=null&&upside(r)!=null&&upside(r)<=0)) return false;
    if(filterMode==='flag'    && !r.flag) return false;
    if(filterMode==='up-flag' && !(r.flag&&r.price!=null&&upside(r)>0)) return false;
    if(mktFilter==='open'   && !isMarketOpen(r.mkt)) return false;
    if(mktFilter==='closed' &&  isMarketOpen(r.mkt)) return false;
    return true;
  });

  list.sort((a,b)=>{
    if(sortKey==='tick') return sortDir*(a.tick<b.tick?-1:a.tick>b.tick?1:0);
    if(sortKey==='mkt')  return sortDir*(a.mkt<b.mkt?-1:a.mkt>b.mkt?1:0);
    if(sortKey==='flag') return sortDir*((b.flag?1:0)-(a.flag?1:0));
    if(sortKey==='upside'){const ua=upside(a),ub=upside(b);if(ua==null&&ub==null)return 0;if(ua==null)return 1;if(ub==null)return -1;return sortDir*(ua-ub);}
    if(sortKey==='range52'){const pa=r52pct(a)??-1,pb=r52pct(b)??-1;return sortDir*(pa-pb);}
    if(sortKey==='daychg'){const da=a.dayChg??-Infinity,db=b.dayChg??-Infinity;return sortDir*(da-db);}
    const k={price:'price',target:'target'}[sortKey];
    const va=a[k]??-Infinity,vb=b[k]??-Infinity;
    return sortDir*(va-vb);
  });

  const tbody=document.getElementById('tbody');
  if(!list.length){
    if(mktFilter==='open' && rows.length>0 && rows.every(r=>!isMarketOpen(r.mkt))){
      const mktSet = [...new Set(rows.map(r=>r.mkt))];

      // exchange = nombre del mercado (izquierda), city = ciudad (derecha)
      // Orden este→oeste. ETR y FRA agrupados (Frankfurt).
      const MKT_DEF = {
        'ASX':    { exchange:'ASX',     city:'Sídney',      tz:'Australia/Sydney',    o:[10,0], c:[16,0],  order:1  },
        'HKG':    { exchange:'HKEX',    city:'Hong Kong',   tz:'Asia/Hong_Kong',      o:[9,30], c:[16,0],  order:2  },
        'ETR':    { exchange:'ETR/FRA', city:'Fráncfort',   tz:'Europe/Berlin',       o:[9,0],  c:[17,30], order:3  },
        'FRA':    { exchange:'ETR/FRA', city:'Fráncfort',   tz:'Europe/Berlin',       o:[9,0],  c:[17,30], order:3  },
        'AMS':    { exchange:'AMS',     city:'Ámsterdam',   tz:'Europe/Amsterdam',    o:[9,0],  c:[17,30], order:4  },
        'BIT':    { exchange:'BIT',     city:'Milán',       tz:'Europe/Rome',         o:[9,0],  c:[17,30], order:5  },
        'VIE':    { exchange:'VIE',     city:'Viena',       tz:'Europe/Vienna',       o:[9,0],  c:[17,30], order:6  },
        'SWX':    { exchange:'SWX',     city:'Zúrich',      tz:'Europe/Zurich',       o:[9,0],  c:[17,30], order:7  },
        'EPA':    { exchange:'EPA',     city:'París',       tz:'Europe/Paris',        o:[9,0],  c:[17,30], order:8  },
        'BME':    { exchange:'BME',     city:'Madrid',      tz:'Europe/Madrid',       o:[9,0],  c:[17,30], order:9  },
        'LON':    { exchange:'LON',     city:'Londres',     tz:'Europe/London',       o:[8,0],  c:[16,30], order:10 },
        'NYSE':   { exchange:'NYSE/NASDAQ', city:'Nueva York',  tz:'America/New_York',    o:[9,30], c:[16,0],  order:11 },
        'NASDAQ': { exchange:'NYSE/NASDAQ', city:'Nueva York',  tz:'America/New_York',    o:[9,30], c:[16,0],  order:11 },
        'OTC':    { exchange:'NYSE/NASDAQ', city:'Nueva York',  tz:'America/New_York',    o:[9,30], c:[16,0],  order:11 },
        'US':     { exchange:'NYSE/NASDAQ', city:'Nueva York',  tz:'America/New_York',    o:[9,30], c:[16,0],  order:11 },
      };

      // Convierte hora de mercado local → minutos desde medianoche en hora del usuario
      const mktToLocalMin = (tz, h, m) => {
        const dateStr = new Date().toISOString().split('T')[0];
        const noon = new Date(`${dateStr}T12:00:00Z`);
        const parts = new Intl.DateTimeFormat('en-US',{
          timeZone:tz, hour:'numeric', minute:'numeric', hour12:false
        }).formatToParts(noon);
        const mktH = parseInt(parts.find(p=>p.type==='hour')?.value||12);
        const mktM = parseInt(parts.find(p=>p.type==='minute')?.value||0);
        const offsetMin = 12*60 - (mktH*60+mktM);
        const utcMs = (h*60+m+offsetMin)*60000;
        const d = new Date(new Date(`${dateStr}T00:00:00Z`).getTime() + utcMs);
        return d.getHours()*60 + d.getMinutes();
      };

      const fmtMin = min => {
        const h = Math.floor(((min%1440)+1440)%1440/60);
        const m = min%60;
        return `${h}:${String(m).padStart(2,'0')}`;
      };

      // Lista deduplicada y ordenada E→O
      const seen = new Set();
      const markets = mktSet
        .filter(m => MKT_DEF[m])
        .sort((a,b) => (MKT_DEF[a].order||99) - (MKT_DEF[b].order||99))
        .reduce((acc, m) => {
          const def = MKT_DEF[m];
          if (seen.has(def.exchange)) return acc;
          seen.add(def.exchange);
          const openMin  = mktToLocalMin(def.tz, def.o[0], def.o[1]);
          const closeMin = mktToLocalMin(def.tz, def.c[0], def.c[1]);
          acc.push({ exchange: def.exchange, city: def.city, openMin, closeMin });
          return acc;
        }, []);

      // ── SVG timeline ──
      const nowMin = new Date().getHours()*60 + new Date().getMinutes();
      const SVG_W = 380, LBL_W = 56, CITY_W = 68;
      const CHART_W = SVG_W - LBL_W - CITY_W;
      const ROW_H = 26;
      const HDR_H  = 22; // espacio para etiquetas top
      const FOOT_H = 18; // espacio para etiquetas bottom
      const cx = min => LBL_W + min / 1440 * CHART_W;
      const nowX = cx(nowMin);
      const CHART_BOT = HDR_H + markets.length * ROW_H + 8;
      const SVG_H = CHART_BOT + FOOT_H;

      // ── Todos los eventos únicos (apertura y cierre de cada mercado) ──
      const allEventMins = [...new Set([
        ...markets.map(m => m.openMin),
        ...markets.map(m => m.closeMin)
      ])].sort((a, b) => a - b);

      // Para cada tiempo, encontrar el mercado más arriba (top) o más abajo (bottom)
      // que lo usa como apertura o cierre, y obtener el borde de su barra azul
      const barTop  = i => HDR_H + i * ROW_H + (ROW_H - 10) / 2;      // top edge
      const barBot  = i => barTop(i) + 10;                              // bottom edge

      // Asignar alternadamente arriba/abajo según orden cronológico
      const eventItems = allEventMins.map((min, idx) => {
        const side = idx % 2 === 0 ? 'top' : 'bot';
        const mktIdxs = markets.reduce((a, m, i) => {
          if (m.openMin === min || m.closeMin === min) a.push(i);
          return a;
        }, []);
        if (!mktIdxs.length) return null;
        // top: línea desde etiqueta hasta borde superior de la barra más alta
        // bot: línea desde borde inferior de la barra más baja hasta etiqueta
        const anchorY = side === 'top'
          ? barTop(mktIdxs[0])
          : barBot(mktIdxs[mktIdxs.length - 1]);
        return { min, x: cx(min), side, anchorY };
      }).filter(Boolean);

      // Barras por mercado (NYSE/NASDAQ en dos líneas)
      const bars = markets.map((m, i) => {
        const y   = HDR_H + i * ROW_H + (ROW_H - 10) / 2;
        const mid = y + 5; // centro vertical de la barra
        const ox = cx(m.openMin), cxE = cx(m.closeMin);
        const normal = m.closeMin > m.openMin;
        const barSvg = normal
          ? `<rect x="${ox.toFixed(1)}" y="${y}" width="${(cxE-ox).toFixed(1)}" height="10" rx="3" fill="#0071e3" opacity=".65"/>`
          : `<rect x="${ox.toFixed(1)}" y="${y}" width="${(LBL_W+CHART_W-ox).toFixed(1)}" height="10" rx="3" fill="#0071e3" opacity=".65"/>
             <rect x="${LBL_W}" y="${y}" width="${(cxE-LBL_W).toFixed(1)}" height="10" rx="3" fill="#0071e3" opacity=".65"/>`;
        const parts = m.exchange.split('/');
        const nameText = parts.length > 1
          ? `<text x="${LBL_W-5}" y="${mid}" font-size="9" fill="#3a3a3c" font-weight="600" text-anchor="end">${parts[0]}</text>
             <text x="${LBL_W-5}" y="${mid+11}" font-size="9" fill="#3a3a3c" font-weight="600" text-anchor="end">${parts[1]}</text>`
          : `<text x="${LBL_W-5}" y="${mid+4}" font-size="10" fill="#3a3a3c" font-weight="600" text-anchor="end">${m.exchange}</text>`;
        return `
          ${nameText}
          <rect x="${LBL_W}" y="${y}" width="${CHART_W}" height="10" rx="3" fill="rgba(0,0,0,.06)"/>
          ${barSvg}
          <text x="${LBL_W+CHART_W+5}" y="${mid+4}" font-size="10" fill="#636366">${m.city}</text>`;
      }).join('');

      // ── Líneas: desde borde de barra hasta etiqueta (arriba o abajo) ──
      const LBL_TOP_Y = HDR_H - 7;      // baseline etiqueta top
      const LBL_BOT_Y = CHART_BOT + 13; // baseline etiqueta bot

      const tickLines = eventItems.map(({ x, side, anchorY }) => {
        const xs = x.toFixed(1);
        return side === 'top'
          ? `<line x1="${xs}" y1="${LBL_TOP_Y + 3}" x2="${xs}" y2="${anchorY}" stroke="#d1d1d6" stroke-width="0.6" stroke-dasharray="3,2"/>`
          : `<line x1="${xs}" y1="${anchorY}" x2="${xs}" y2="${LBL_BOT_Y - 4}" stroke="#d1d1d6" stroke-width="0.6" stroke-dasharray="3,2"/>`;
      }).join('');

      const tickLabels = eventItems.map(({ min, x, side }) => {
        const xs = x.toFixed(1);
        return side === 'top'
          ? `<text x="${xs}" y="${LBL_TOP_Y}" font-size="7.5" fill="#8e8e93" text-anchor="middle">${fmtMin(min)}</text>`
          : `<text x="${xs}" y="${LBL_BOT_Y}" font-size="7.5" fill="#aeaeb2" text-anchor="middle">${fmtMin(min)}</text>`;
      }).join('');

      // Línea de hora actual — dentro del área de barras
      const nowLine = `<line x1="${nowX.toFixed(1)}" y1="${HDR_H}" x2="${nowX.toFixed(1)}" y2="${CHART_BOT}" stroke="#0071e3" stroke-width="1.5"/>`;

      // Orden de renderizado: líneas → barras → línea-ahora → etiquetas (etiquetas siempre al frente)
      const svgContent = `<svg width="100%" viewBox="0 0 ${SVG_W} ${SVG_H}" style="max-width:${SVG_W}px;overflow:visible;display:block">
        ${tickLines}${bars}${nowLine}${tickLabels}
      </svg>`;

      document.querySelector('thead').style.display = 'none';
      const barH = document.getElementById('bar').offsetHeight;
      tbody.innerHTML=`<tr class="no-hover"><td colspan="8" style="padding:0;border:none">
        <div style="min-height:calc(100vh - ${barH}px);display:flex;flex-direction:column;align-items:center;
                    justify-content:flex-start;padding:6vh 16px 24px;gap:0;background:var(--sur)">
          <div style="font-size:26px;margin-bottom:8px">🛌 💤</div>
          <div style="font-size:15px;font-weight:600;color:#1c1c1e;margin-bottom:20px">Todos los mercados cerrados</div>
          ${svgContent}
        </div>
      </td></tr>`;
      return;
    }
    tbody.innerHTML='<tr class="row-empty"><td colspan="8">Sin resultados</td></tr>';
    return;
  }

  tbody.innerHTML=list.map((r,i)=>{
    const u=upside(r);
    const uSt=u==null?'—':(u>=0?'+':'')+u.toFixed(1)+'%';
    const {bg:pBg, color:pColor} = pillStyle(u);
    const pillInline = u==null ? 'class="pill nt"' : `class="pill" style="background:${pBg};color:${pColor}"`;
    const rid='r_'+r.tick.replace(/[^a-zA-Z0-9]/g,'_');
    const st=r.tick.replace(/'/g,"\\'");

    const prStr=r.price==null
      ?'<span class="sk" style="width:46px;height:12px"></span>'
      :`<span class="num">${fmt(r.price)}${r.cur?`<span class="cur">${r.cur}</span>`:''}</span>`;

    const tgtStr=r.target!=null
      ?`<span class="num">${fmt(r.target)}${r.cur?`<span class="cur">${r.cur}</span>`:''}</span>`
      :'<span style="color:var(--lbl)">—</span>';

    const nmStr=r.name||(r.price==null?'<span class="sk" style="width:100px;height:12px"></span>':'—');
    const trCls=[r.flag?'flagged':'',r.price==null?'unloaded':''].filter(Boolean).join(' ');

    return `<tr id="${rid}" class="${trCls}">
      <td class="cfl"><span class="bfl ${r.flag?'on':''}">🔥</span></td>
      <td class="ctk">${r.tick}<span class="mkt-inline ${isMarketOpen(r.mkt)?'open':'closed'}">${MF[r.mkt]||r.mkt}</span></td>
      <td class="cnm col-empresa" title="${r.name||''}">${nmStr}</td>
      <td class="cpr">${prStr}</td>
      <td class="ctg">${tgtStr}</td>
      <td class="cup"><span ${pillInline}>${uSt}</span></td>
      <td class="cdchg">${dayChgStr(r)}</td>
      <td class="c52 col-52w">${range52svg(r)}</td>
    </tr>`;
  }).join('');
}
